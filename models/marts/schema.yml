  - name: dim_source_system
    description: >
      Silver Source System dimension. Schema SILVER_DBT | Table DIM_SOURCE_SYSTEM.
      Static lookup table - no staging needed.
    columns:
      - name: SOURCE_SYSTEM_ID
        description: Unique identifier for source system
        data_tests: [not_null, unique]
      - name: SOURCE_SYSTEM_NAME
        description: Full name of the source system
        data_tests: [not_null]
      - name: SYSTEM_CODE
        description: Short code for source system
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['HCHB']
      - name: IS_ACTIVE
        data_tests: [not_null]
      - name: INSERTED_DATE
        data_tests: [not_null]
      - name: INSERTED_BY
        data_tests: [not_null]
      - name: UPDATED_DATE
        data_tests: [not_null]
      - name: UPDATED_BY
        data_tests: [not_null]