version: 2

models:

  - name: dim_discipline
    description: Silver Discipline. Schema SILVER_DBT | Table DIM_DISCIPLINE
    columns:
      - name: DISCIPLINE_KEY
        data_tests: [not_null, unique]
      - name: SOURCE_SYSTEM_ID
        data_tests: [not_null]
      - name: SYSTEM_CODE
        data_tests: [not_null]
      - name: CODE
        data_tests: [not_null]
      - name: ID
        data_tests: [not_null]
      - name: DESCRIPTION
      - name: IS_ACTIVE
      - name: RATE
      - name: REVENUECODE
      - name: CDC_OP
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['INSERT', 'UPDATE']
      - name: CDC_TS
        data_tests: [not_null]
      - name: INSERTED_DATE
        data_tests: [not_null]
      - name: INSERTED_BY
        data_tests: [not_null]
      - name: UPDATED_DATE
        data_tests: [not_null]
      - name: UPDATED_BY
        data_tests: [not_null]

