  - name: dim_date
    description: >
      Silver Date dimension. Schema SILVER_DBT | Table DIM_DATE.
      Covers 2020-01-01 to 2030-12-31. Fiscal year Oct-Sep.
      Full refresh table - no staging needed.
    columns:
      - name: DATE_KEY
        description: Date key in YYYYMMDD format
        data_tests: [not_null, unique]
      - name: CALENDAR_DATE
        description: Actual calendar date
        data_tests: [not_null, unique]
      - name: YEAR
        data_tests: [not_null]
      - name: FIRST_DAY_OF_YEAR
      - name: LAST_DAY_OF_YEAR
      - name: PREVIOUS_YEAR_FIRST_DAY
      - name: PREVIOUS_YEAR_LAST_DAY
      - name: ISO_YEAR
      - name: FISCAL_YEAR
        data_tests: [not_null]
      - name: FISCAL_YEAR_LABEL
      - name: FIRST_DAY_OF_FISCAL_YEAR
      - name: LAST_DAY_OF_FISCAL_YEAR
      - name: FISCAL_QUARTER
        data_tests: [not_null]
      - name: FISCAL_QUARTER_NAME
      - name: FISCAL_QUARTER_YEAR
      - name: FISCAL_MONTH
        data_tests: [not_null]
      - name: FISCAL_WEEK_NUMBER
      - name: FISCAL_WEEK_LABEL
      - name: QUARTER
        data_tests: [not_null]
      - name: QUARTER_NAME
      - name: QUARTER_YEAR
      - name: FIRST_DAY_OF_QUARTER
      - name: LAST_DAY_OF_QUARTER
      - name: PREVIOUS_QUARTER_FIRST_DAY
      - name: PREVIOUS_QUARTER_LAST_DAY
      - name: MONTH
        data_tests: [not_null]
      - name: MONTH_NAME
      - name: YEAR_MONTH_DESC
      - name: YEAR_MONTH
      - name: FIRST_DAY_OF_MONTH
      - name: LAST_DAY_OF_MONTH
      - name: PREVIOUS_MONTH_FIRST_DAY
      - name: PREVIOUS_MONTH_LAST_DAY
      - name: DAYS_IN_MONTH
      - name: WEEK_OF_YEAR
      - name: WEEK_START
      - name: WEEK_END
      - name: WEEK_ASSIGNED_FISCAL_YEAR
      - name: WEEK_ASSIGNED_FISCAL_YEAR_SORT
      - name: WEEK_ASSIGNED_FISCAL_MONTH
      - name: WEEK_ASSIGNED_FISCAL_QUARTER
      - name: WEEK_ASSIGNED_YEAR
      - name: WEEK_ASSIGNED_MONTH
      - name: WEEK_ASSIGNED_QUARTER
      - name: WEEK_ASSIGNED_QUARTER_SORT
      - name: WEEK_ASSIGNED_YEAR_MONTH
      - name: DAY_OF_YEAR
        data_tests: [not_null]
      - name: DAY_OF_MONTH
        data_tests: [not_null]
      - name: DAY_OF_WEEK
        data_tests: [not_null]
      - name: DAY_NAME
        data_tests: [not_null]
      - name: ISO_WEEK
      - name: ISO_DAY
      - name: WEEKEND_FLAG
        data_tests: [not_null]
      - name: ACC_HOLIDAY_OBSERVED_FLAG
      - name: IS_CURRENT_YEAR
      - name: IS_CURRENT_QUARTER
      - name: IS_CURRENT_MONTH
      - name: IS_TODAY
      - name: IS_CURRENT_FISCAL_YEAR
      - name: IS_CURRENT_FISCAL_QUARTER
      - name: IS_CURRENT_FISCAL_MONTH
      - name: ETL_INSERTED_DATE
        data_tests: [not_null]
      - name: ETL_INSERTED_BY
        data_tests: [not_null]
      - name: ETL_UPDATED_DATE
        data_tests: [not_null]
      - name: ETL_UPDATED_BY
